name: Insight AfriResearch CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test -- --passWithNoTests

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Next.js app
      run: npm run build
      env:
        NEXT_PUBLIC_SITE_URL: https://afriresearch.vercel.app
        NEXT_PUBLIC_SITE_NAME: "Insight AfriResearch Ltd"
        # TODO: add these secrets in GitHub → Settings → Secrets → Actions
        RESEND_API_KEY: placeholder
        RESEND_FROM_EMAIL: noreply@insightafriresearch.com
        ADMIN_EMAIL: insightafri@gmail.com

    - name: Build stats
      run: |
        echo "📊 Build Statistics:"
        du -sh .next
        echo "✅ Insight AfriResearch build successful!"

  deploy:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel environment
      # TODO: add VERCEL_TOKEN in GitHub → Settings → Secrets → Actions
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

    - name: Build on Vercel
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

    - name: Deploy to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

    - name: Deployment summary
      run: |
        echo "🚀 Deployed to https://afriresearch.vercel.app/"
        echo "✅ Production deployment complete!"